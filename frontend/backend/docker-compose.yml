# Backend-only dev stack with hot-reload (uses local PostgreSQL on host).
# Usage from the backend/ directory:
#   docker-compose up --build

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uih_backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@host.docker.internal:5432/unified_identity_hub
      SECRET_KEY: dev-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost:80"
      APP_ENV: development
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "alembic upgrade head && python3 seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
