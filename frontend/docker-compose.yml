# Full-stack: backend + frontend (nginx)
# Uses the LOCAL PostgreSQL on the host machine (port 5432).
#
# One-time setup — run these on your host before `docker compose up`:
#
#   sudo -u postgres psql -c "ALTER USER postgres WITH PASSWORD 'postgres';"
#   sudo -u postgres psql -c "CREATE DATABASE unified_identity_hub;"
#   # Allow Docker network (172.17.0.0/16) in pg_hba.conf:
#   echo 'host all all 172.17.0.0/16 scram-sha-256' | sudo tee -a /etc/postgresql/17/main/pg_hba.conf
#   # Allow PostgreSQL to accept external connections:
#   sudo sed -i "s/#listen_addresses = 'localhost'/listen_addresses = '*'/" /etc/postgresql/17/main/postgresql.conf
#   sudo systemctl reload postgresql
#
# Then:
#   docker compose up --build

services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uih_backend
    restart: unless-stopped
    # Maps host.docker.internal → host gateway so the container can reach
    # the PostgreSQL running on your machine.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Load GEMINI_API_KEY, GEMINI_MODEL, etc. from backend/.env
    env_file:
      - ./backend/.env
    environment:
      # These explicit values override anything in env_file above
      DATABASE_URL: postgresql+asyncpg://postgres:Nigielove_21@host.docker.internal:5432/unified_identity_hub
      SECRET_KEY: change-me-in-production-use-openssl-rand-hex-32
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8000,http://localhost:5173,http://frontend"
      APP_ENV: production
    ports:
      - "8000:8000"

  # ── React Frontend (nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uih_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
