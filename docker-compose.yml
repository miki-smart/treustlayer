version: "3.9"

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: trustlayer_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trustlayer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trustlayer"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - trustlayer_net

  # Backend (Merged Backend)
  backend:
    build:
      context: ./backend-merged
      dockerfile: Dockerfile
    container_name: trustlayer_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend-merged/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/trustlayer
      - ISSUER=http://localhost:8000
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost:8080,http://frontend:5173
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend-merged:/app
    networks:
      - trustlayer_net
    restart: on-failure
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # Frontend (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trustlayer_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://backend:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - trustlayer_net
    depends_on:
      - backend
    restart: on-failure

volumes:
  postgres_data:

networks:
  trustlayer_net:
    driver: bridge
